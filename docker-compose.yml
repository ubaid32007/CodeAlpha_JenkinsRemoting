version: '3.8'

# ──────────────────────────────────────────────────
# CodeAlpha DevOps Internship — Task 2
# Jenkins Remoting Project
#
# Services:
#   jenkins-master  — Jenkins controller (port 8080)
#   jenkins-agent   — Remote build agent (connects via JNLP port 50000)
#
# Usage:
#   docker-compose up --build
#   Open: http://localhost:8080
#   Login: admin / admin123
# ──────────────────────────────────────────────────

services:

  # ── Jenkins Master (Controller) ──────────────────
  jenkins-master:
    build:
      context: ./master
      dockerfile: Dockerfile
    container_name: jenkins-master
    hostname: jenkins-master
    ports:
      - "8080:8080"     # Jenkins Web UI
      - "50000:50000"   # JNLP agent connection port
    environment:
      - JENKINS_OPTS=--httpPort=8080
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home   # Persist Jenkins data
      - /var/run/docker.sock:/var/run/docker.sock  # Docker access
    networks:
      - jenkins-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Jenkins Agent (Remote Node) ──────────────────
  jenkins-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: jenkins-agent
    hostname: jenkins-agent
    environment:
      - JENKINS_URL=http://jenkins-master:8080         # Master URL
      - JENKINS_AGENT_NAME=codealpha-agent             # Must match groovy script
      - JENKINS_SECRET=${AGENT_SECRET:-placeholder}    # Get from Jenkins UI
      - JENKINS_WEB_SOCKET=true
    volumes:
      - agent_workspace:/home/jenkins/agent            # Persist workspace
      - /var/run/docker.sock:/var/run/docker.sock      # Docker access from agent
    networks:
      - jenkins-net
    depends_on:
      jenkins-master:
        condition: service_healthy
    restart: unless-stopped

volumes:
  jenkins_home:
    driver: local
  agent_workspace:
    driver: local

networks:
  jenkins-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
